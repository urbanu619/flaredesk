<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #1a1a2e; display: flex; gap: 40px; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    .option { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .option img { width: 120px; height: 120px; }
    .label { color: #aaa; font-size: 14px; text-align: center; }
    .name { color: white; font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="option">
    <img src="logo-1-flame-dns.svg">
    <div class="name">方案一</div>
    <div class="label">橙色火焰 + DNS 节点</div>
  </div>
  <div class="option">
    <img src="logo-2-lightning.svg">
    <div class="name">方案二</div>
    <div class="label">深色背景 + 蓝色闪电</div>
  </div>
  <div class="option">
    <img src="logo-3-flame-bolt.svg">
    <div class="name">方案三</div>
    <div class="label">橙色火焰 + 白色闪电</div>
  </div>
</body>
</html>
